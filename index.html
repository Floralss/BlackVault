<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🛒 БРОСКАССА • BlackVault Market</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --bg: #0D0D13;
        --surface: #17171F;
        --accent: #7C5CFC;
        --green: #3DDC84;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg);
        color: #F5F5FC;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    header {
        background: var(--surface);
        padding: 15px 20px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-weight: 800;
        font-size: 22px;
    }
    .main { flex: 1; display: flex; overflow: hidden; }
    .catalog { width: 340px; background: var(--surface); border-right: 1px solid rgba(255,255,255,0.08); padding: 20px; overflow-y: auto; }
    .cart { flex: 1; padding: 20px; overflow-y: auto; background: #0D0D13; }

    .product {
        background: #1F1F2A;
        padding: 14px;
        margin-bottom: 12px;
        border-radius: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 14px;
    }
    .product:hover { background: #262633; transform: translateY(-3px); }

    .cart-item {
        background: #1F1F2A;
        padding: 14px 18px;
        border-radius: 14px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .total-bar {
        position: sticky;
        bottom: 0;
        background: var(--surface);
        padding: 20px;
        border-top: 2px solid var(--accent);
        margin: 20px -20px -20px;
    }
    button {
        padding: 14px 24px;
        font-size: 17px;
        font-weight: 800;
        border: none;
        border-radius: 14px;
        cursor: pointer;
    }
    .btn-pay {
        background: linear-gradient(150deg, #7C5CFC, #A78BFA);
        color: white;
        width: 100%;
        margin-top: 10px;
    }

    /* Модалки */
    .modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.95);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }
    .modal-content {
        background: var(--surface);
        border-radius: 24px;
        width: 90%;
        max-width: 420px;
        padding: 30px;
    }

    /* BlackVault Login */
    #bv-login-screen {
        background: radial-gradient(ellipse at top, #1A1430, #0D0D13);
    }
</style>
</head>
<body>

<header>
    <div>🛒 БРОСКАССА</div>
    <div style="font-size:15px;color:#9C9CC0">BlackVault Market</div>
</header>

<div class="main">
    <div class="catalog">
        <h2 style="margin-bottom:20px;color:var(--accent)">📦 Товары</h2>
        <div id="products"></div>
    </div>

    <div class="cart">
        <h2>🛍 Корзина</h2>
        <div id="cartItems" style="min-height:400px"></div>
        
        <div class="total-bar">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
                <span style="color:#9C9CC0">Итого:</span>
                <span id="subtotal" style="font-size:28px;font-weight:900;color:#FFB23E">0 ₴</span>
            </div>
            <button class="btn-pay" onclick="openPaymentModal()">💳 ОПЛАТИТЬ</button>
        </div>
    </div>
</div>

<!-- Оплата -->
<div class="modal" id="paymentModal">
    <div class="modal-content">
        <h2 style="text-align:center;margin-bottom:25px">Способ оплаты</h2>
        
        <div onclick="payCash()" style="background:#1F1F2A;padding:20px;border-radius:16px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:16px">
            <span style="font-size:40px">💵</span>
            <div><b>Наличными</b><br><small style="color:#9C9CC0">Сдача сразу</small></div>
        </div>
        
        <div onclick="startBlackVaultPayment()" style="background:#1F1F2A;padding:20px;border-radius:16px;cursor:pointer;display:flex;align-items:center;gap:16px">
            <span style="font-size:40px">🔐</span>
            <div><b>BlackVault Карта</b><br><small style="color:#9C9CC0">Мгновенный перевод</small></div>
        </div>
        
        <button onclick="closeModal()" style="margin-top:20px;width:100%;background:#333;color:white">Отмена</button>
    </div>
</div>

<!-- BlackVault Login + Оплата -->
<div class="modal" id="bvModal">
    <div class="modal-content" id="bv-login-screen">
        <div style="text-align:center;margin-bottom:20px">
            <div style="font-size:48px">🔐</div>
            <h2>BlackVault</h2>
            <p id="bvStatus">Войдите в аккаунт для оплаты</p>
        </div>

        <input id="bvEmail" type="text" placeholder="Email или код BV-XXXXXX" style="width:100%;padding:14px;background:#1F1F2A;border:1px solid #444;border-radius:12px;color:white;margin-bottom:12px">
        <input id="bvPin" type="password" placeholder="PIN-код (4 цифры)" maxlength="4" style="width:100%;padding:14px;background:#1F1F2A;border:1px solid #444;border-radius:12px;color:white;margin-bottom:20px">

        <button onclick="confirmBVLogin()" style="width:100%;padding:16px;background:linear-gradient(150deg,#7C5CFC,#A78BFA);color:white;border:none;border-radius:14px;font-weight:800">
            Войти и оплатить
        </button>
        <button onclick="closeBVModal()" style="margin-top:10px;width:100%;background:#333;color:white">Отмена</button>
    </div>
</div>

<script>
// Товары
const products = [
    { name: "Чипсы Lays", price: 55, emoji: "🥔" },
    { name: "Cola 0.5л", price: 45, emoji: "🥤" },
    { name: "Red Bull", price: 65, emoji: "⚡" },
    { name: "Пицца", price: 120, emoji: "🍕" },
    { name: "Сникерс", price: 35, emoji: "🍫" },
    { name: "Вода", price: 25, emoji: "💧" }
];

let cart = [];
let currentTotal = 0;

// Рендер товаров
function renderProducts() {
    document.getElementById('products').innerHTML = products.map((p,i) => `
        <div class="product" onclick="addToCart(${i})">
            <span style="font-size:32px">${p.emoji}</span>
            <div style="flex:1">
                <div style="font-weight:700">${p.name}</div>
                <div style="color:#FFB23E">${p.price} ₴</div>
            </div>
        </div>
    `).join('');
}

function addToCart(i) {
    const p = products[i];
    const exist = cart.find(item => item.name === p.name);
    if (exist) exist.qty = (exist.qty||1) + 1;
    else cart.push({...p, qty:1});
    renderCart();
}

function renderCart() {
    currentTotal = cart.reduce((sum, item) => sum + item.price * (item.qty||1), 0);
    document.getElementById('subtotal').textContent = currentTotal + " ₴";

    document.getElementById('cartItems').innerHTML = cart.map((item, i) => `
        <div class="cart-item">
            <div>${item.emoji} ${item.name} ${item.qty>1?`×${item.qty}`:''}</div>
            <div style="text-align:right">
                ${item.price * (item.qty||1)} ₴
                <button onclick="removeItem(${i})" style="color:#FF4D6A;background:none;border:none;font-size:12px">✕</button>
            </div>
        </div>
    `).join('') || '<div style="text-align:center;padding:80px 20px;color:#666">Корзина пуста</div>';
}

window.removeItem = (i) => { cart.splice(i,1); renderCart(); };

function openPaymentModal() {
    if (currentTotal === 0) return alert("Корзина пуста!");
    document.getElementById('paymentModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('paymentModal').style.display = 'none';
}

// Наличные
function payCash() {
    closeModal();
    const given = prompt(`К оплате: ${currentTotal} ₴\nСколько наличных?`, currentTotal);
    if (given) {
        const change = parseFloat(given) - currentTotal;
        if (change >= 0) {
            alert(`✅ ОПЛАЧЕНО НАЛИЧНЫМИ!\nСдача: ${change} ₴`);
            finishSale();
        }
    }
}

// BlackVault оплата
function startBlackVaultPayment() {
    closeModal();
    document.getElementById('bvModal').style.display = 'flex';
}

function confirmBVLogin() {
    const email = document.getElementById('bvEmail').value.trim();
    if (!email) return alert("Введите email или BV-код");

    alert(`✅ Успешный вход в BlackVault!\n\nСписано: ${currentTotal} ₴\nПереведено на ваш кошелёк`);
    closeBVModal();
    finishSale();
}

function closeBVModal() {
    document.getElementById('bvModal').style.display = 'none';
}

function finishSale() {
    alert("🎉 Продажа завершена! Деньги зачислены в BlackVault.");
    cart = [];
    renderCart();
}

// Инициализация
renderProducts();
renderCart();
</script>
</body>
</html>
